name: Publish Pack Artifacts

on:
  push:
    branches:
      - main
    paths:
      - packs/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-pack-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and publish pack artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/build-pack-artifacts.py \
            --repo-root . \
            --repo-url "https://github.com/${{ github.repository }}" \
            --github-repository "${{ github.repository }}"

      - name: Commit updated artifact catalog
        run: |
          set -euo pipefail
          if git diff --quiet -- catalogs/pack-artifacts.json; then
            echo "No catalog changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add catalogs/pack-artifacts.json
          git commit -m "chore: update pack artifact catalog"
          git push origin "HEAD:${{ github.ref_name }}"

      - name: Dispatch downstream free-pack sync
        if: ${{ success() && github.event_name != 'pull_request' }}
        env:
          CONTEXT_BANK_REPOSITORY_DISPATCH_TOKEN: ${{ secrets.CONTEXT_BANK_REPOSITORY_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          published_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          payload="$(printf '{"event_type":"free-pack-artifacts-published","client_payload":{"repoUrl":"https://github.com/%s","releaseTag":"pack-artifacts","catalogPath":"catalogs/pack-artifacts.json","publishedAt":"%s","sourceRevision":"%s"}}' \
            "${GITHUB_REPOSITORY}" \
            "${published_at}" \
            "${GITHUB_SHA}")"

          curl --fail-with-body --silent --show-error \
            --request POST \
            --url "https://api.github.com/repos/tigerokuma/context-bank/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${CONTEXT_BANK_REPOSITORY_DISPATCH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "${payload}"
