name: Publish Pack Artifacts

on:
  push:
    branches:
      - main
    paths:
      - packs/**
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  publish-pack-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build and publish pack artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          python3 scripts/build-pack-artifacts.py \
            --repo-root . \
            --repo-url "https://github.com/${{ github.repository }}" \
            --github-repository "${{ github.repository }}"

      - name: Create or update catalog refresh PR
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: catalogs/pack-artifacts.json
          branch: automation/update-pack-artifact-catalog
          commit-message: "chore: update pack artifact catalog"
          delete-branch: true
          title: "chore: update pack artifact catalog"
          body: |
            This PR was generated automatically after publishing free-pack artifacts.

            - refreshes `catalogs/pack-artifacts.json`
            - keeps `main` protected from direct workflow pushes
